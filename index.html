<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="https://fonts.googleapis.com/css?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
    <script
    src="https://kit.fontawesome.com/2d323a629b.js"
    crossorigin="anonymous"
  ></script>
  <script src="main.js" defer></script>
</head>
<body>
    <!-- Header -->
   <header>
    <div class="logo">
       <i class = "fab fa-youtube"></i>
       <span class="title">Youtube</span>
    </div>
    <div class="icon">
        <i class = "fas fa-search"></i>
        <i class = "fas fa-ellipsis-v"></i>
    </div>
   </header>
   <!-- Video Player -->
   <section class="player"></section>
   <video controls src="video/RPReplay_Final1657190733.MP4"></video>
   <!-- video info -->
   <section class="info"></section>
   <!-- metadata -->
   <div class="metadata">
    <ul class="hashtags">
        <li>#엄진웅</li>
        <li>#모솔</li>
        <li>#씹덕</li>
    </ul>
    <div class="titleAndButton">
        <span class="title">
            엄진웅이 연애를 못하는 10가지 이유 설명
        </span>
        <button class="moreBtn">
            <i class = "fas fa-caret-down"></i>
        </button>
    </div>
    <div class="views">
        <span class="views">1M views 1 month ago</span>
    </div>
   </div>
   <!-- actions -->
   <div class="actions">
    <li><button>
        <i class = "fas fa-thumbs-up"></i>
    </button></li>
    <li><button>
        <i class = "fas fa-thumbs-down"></i>
    </button></li>
    <li><button>
        <i class = "fas fa-share"></i>
    </button></li>
    <li><button>
        <i class = "fas fa-plus"></i>
    </button></li>
    <li><button>
        <i class = "fab fa-font-awesome-flag"></i>
    </button></li>
   </div>
   <!-- channel discription -->
   <div class="channel">
    <div class="metadata">
        <img src="image/스크린샷 2022-07-07 오후 8.35.21.png" alt="">
        <div class="info"><span class="name">모솔현자엄진웅</span>
            <span class="subscriber">10M subcribers</span></div>
    </div>
    <button class="subscribe">subscribe</button>
   </div>
   <sction class="upNext">
    <span class="title">Up next</span>
    <ul>
        <li class="item">
            <img src="image/스크린샷 2022-07-07 오후 8.35.21.png" alt="">
            <div class="info">
                <span class="title">
                    엄진웅의 연애할 가능성은 ???
                </span><span class="name">
                    모솔현자엄진웅
                </span><span class="views">
                    82K views
                </span>
            </div>
            <button class="moreBtn"></button>
        </li>
        <li class="item">
            <img src="image/스크린샷 2022-07-07 오후 8.35.21.png" alt="">
            <span class="title">
                30대가 얼마남지 않은 엄진웅 연애의 행방은?
            </span><span class="name">모솔현자엄진웅</span><span class="views">10M views</span>
        </li>
        <li class="item">
            <img src="image/스크린샷 2022-07-07 오후 8.35.21.png" alt="">
            <span class="title">
                엄진웅이 추천하는 씹덕애니 10선!
            </span><span class="name">모솔현자엄진웅
            </span><span class="views">1M views</span>
        </li>
    </ul>
   </sction>
</body>
</html>
